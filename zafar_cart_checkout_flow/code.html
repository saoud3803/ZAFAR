<body class="bg-surface text-on-surface antialiased min-h-screen font-body-md text-body-md flex flex-col">
<!-- TopAppBar Suppressed as per rule: Linear/Transactional intent (Checkout) -->
<main class="flex-grow flex flex-col md:flex-row relative">
<!-- Main Area: Checkout Flow -->
<section class="flex-1 w-full max-w-[800px] mx-auto px-margin-edge py-section-gap">
<div class="mb-stack-md">
<a class="font-label-caps text-label-caps text-on-surface-variant flex items-center gap-2 hover:text-on-surface transition-colors duration-300 w-fit" href="#">
<span class="material-symbols-outlined" style="font-size: 16px;">arrow_back</span>
                    RETURN TO CART
                </a>
</div>
<h1 class="font-headline-lg text-headline-lg mb-12">Checkout</h1>
<form class="space-y-16">
<!-- Contact Information -->
<div class="space-y-6">
<h2 class="font-headline-md text-headline-md border-b-[0.5px] border-outline-variant pb-4">Contact</h2>
<div class="space-y-4">
<div>
<label class="sr-only" for="email">Email</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="email" placeholder="Email Address" type="email"/>
</div>
<div class="flex items-center gap-3 pt-2">
<input class="appearance-none w-4 h-4 border-[1px] border-outline-variant checked:bg-primary checked:border-primary focus:ring-0 cursor-pointer relative after:content-[''] after:absolute after:hidden checked:after:block after:w-1.5 after:h-2.5 after:border-r-2 after:border-b-2 after:border-on-primary after:rotate-45 after:left-[5px] after:top-[1px]" id="newsletter" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="newsletter">Email me with news and offers</label>
</div>
</div>
</div>
<!-- Shipping Address -->
<div class="space-y-6">
<h2 class="font-headline-md text-headline-md border-b-[0.5px] border-outline-variant pb-4">Shipping</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="md:col-span-2">
<label class="sr-only" for="country">Country/Region</label>
<select class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono text-on-surface transition-colors duration-300 appearance-none" id="country">
<option value="US">United States</option>
<option value="UK">United Kingdom</option>
<option value="CA">Canada</option>
</select>
</div>
<div>
<label class="sr-only" for="first-name">First name</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="first-name" placeholder="First name" type="text"/>
</div>
<div>
<label class="sr-only" for="last-name">Last name</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="last-name" placeholder="Last name" type="text"/>
</div>
<div class="md:col-span-2">
<label class="sr-only" for="address">Address</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="address" placeholder="Address" type="text"/>
</div>
<div class="md:col-span-2">
<label class="sr-only" for="apartment">Apartment, suite, etc. (optional)</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="apartment" placeholder="Apartment, suite, etc. (optional)" type="text"/>
</div>
<div class="grid grid-cols-3 gap-4 md:col-span-2">
<div class="col-span-1">
<label class="sr-only" for="city">City</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="city" placeholder="City" type="text"/>
</div>
<div class="col-span-1">
<label class="sr-only" for="state">State</label>
<select class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono text-on-surface transition-colors duration-300 appearance-none" id="state">
<option disabled="" selected="" value="">State</option>
<option value="NY">New York</option>
<option value="CA">California</option>
</select>
</div>
<div class="col-span-1">
<label class="sr-only" for="zip">ZIP code</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="zip" placeholder="ZIP code" type="text"/>
</div>
</div>
</div>
</div>
<!-- Payment -->
<div class="space-y-6">
<h2 class="font-headline-md text-headline-md border-b-[0.5px] border-outline-variant pb-4">Payment</h2>
<p class="font-ui-mono text-ui-mono text-on-surface-variant">All transactions are secure and encrypted.</p>
<div class="border-[1px] border-outline-variant p-6 space-y-4">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<input checked="" class="appearance-none w-4 h-4 border-[1px] border-outline-variant rounded-full checked:border-[4px] checked:border-on-surface focus:ring-0 cursor-pointer" id="credit-card" name="payment" type="radio"/>
<label class="font-body-md text-body-md text-on-surface cursor-pointer" for="credit-card">Credit Card</label>
</div>
</div>
<div class="space-y-4 pt-4 border-t-[0.5px] border-outline-variant">
<div>
<label class="sr-only" for="card-number">Card number</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="card-number" placeholder="Card number" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="sr-only" for="expiration">Expiration date (MM / YY)</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="expiration" placeholder="Expiration date (MM / YY)" type="text"/>
</div>
<div>
<label class="sr-only" for="security-code">Security code</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="security-code" placeholder="Security code" type="text"/>
</div>
</div>
<div>
<label class="sr-only" for="name-on-card">Name on card</label>
<input class="w-full bg-transparent border-b-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" id="name-on-card" placeholder="Name on card" type="text"/>
</div>
</div>
</div>
</div>
<div class="pt-8">
<button class="w-full bg-tertiary text-on-tertiary py-6 font-label-caps text-label-caps hover:bg-surface hover:text-tertiary border-[1px] border-transparent hover:border-tertiary transition-all duration-300" type="button">
                        PAY NOW
                    </button>
</div>
</form>
</section>
<!-- Right Sidebar: Order Summary -->

<div class="p-margin-edge space-y-12">
<h3 class="font-headline-md text-headline-md border-b-[0.5px] border-outline-variant pb-4">Order Summary</h3>
<div class="space-y-8">
<!-- Line Item 1 -->
<div class="flex gap-6 group">
<div class="w-24 h-32 relative bg-surface-dim overflow-hidden flex-shrink-0">

<span class="absolute top-0 right-0 bg-tertiary text-on-tertiary w-6 h-6 flex items-center justify-center font-ui-mono text-[10px] m-1 rounded-full">1</span>
</div>
<div class="flex-1 flex flex-col justify-between">
<div>
<h4 class="font-body-md text-body-md font-medium text-on-surface">Structured Leather Tote</h4>
<p class="font-ui-mono text-ui-mono text-on-surface-variant mt-1">Noir / OS</p>
</div>
<div class="font-ui-mono text-ui-mono text-on-surface">$850.00</div>
</div>
</div>
<!-- Line Item 2 -->
<div class="flex gap-6 group">
<div class="w-24 h-32 relative bg-surface-dim overflow-hidden flex-shrink-0">
<img alt="A close-up fashion editorial shot of a heavy, brutalist silver chain necklace resting on rough concrete. The lighting is cold and cinematic, creating high contrast between the polished metal and the textured stone. The mood is raw, austere, and luxurious." class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out" data-alt="A close-up fashion editorial shot of a heavy, brutalist silver chain necklace resting on rough concrete. The lighting is cold and cinematic, creating high contrast between the polished metal and the textured stone. The mood is raw, austere, and luxurious." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCQCsuKGpeRBk09WY1DjaLKjnq3q8OHzXVKlR26331NGneNtKn-kyMjuJ0WzpAZs9WVKWghlCPwN6haiXhQz5K_21Y6BiqZoTgETLDNlpNoHM5511K4IDg2y90rKWLFr_Sojd9zXFFKhsBPBbRGyvY-Sv8zRteIYYPDc863Szf44_CkZVYMTccWiDPglPhkQV0rOgdixGbi6Jl0VvlpvdVKyBvfzOQthWqqdfgxbNAo7_-XZIpNNNThDSkBkYBRaydjgMu2pOPumaI"/>
<span class="absolute top-0 right-0 bg-tertiary text-on-tertiary w-6 h-6 flex items-center justify-center font-ui-mono text-[10px] m-1 rounded-full">1</span>
</div>
<div class="flex-1 flex flex-col justify-between">
<div>
<h4 class="font-body-md text-body-md font-medium text-on-surface">Industrial Chain Link</h4>
<p class="font-ui-mono text-ui-mono text-on-surface-variant mt-1">Silver / OS</p>
</div>
<div class="font-ui-mono text-ui-mono text-on-surface">$420.00</div>
</div>
</div>
</div>
<!-- Coupon Input -->
<div class="flex gap-4 pt-8 border-t-[0.5px] border-outline-variant">
<input class="flex-1 bg-transparent border-[1px] border-outline-variant focus:border-on-surface focus:ring-0 px-4 py-3 font-ui-mono text-ui-mono placeholder:text-outline transition-colors duration-300" placeholder="Gift card or discount code" type="text"/>
<button class="bg-surface-dim text-on-surface px-6 py-3 font-label-caps text-label-caps hover:bg-on-surface hover:text-surface transition-colors duration-300" type="button">APPLY</button>
</div>
<!-- Totals -->
<div class="space-y-4 pt-8 border-t-[0.5px] border-outline-variant font-ui-mono text-ui-mono">
<div class="flex justify-between text-on-surface-variant">
<span>Subtotal</span>
<span>$1,270.00</span>
</div>
<div class="flex justify-between text-on-surface-variant">
<span>Shipping</span>
<span>Calculated at next step</span>
</div>
<div class="flex justify-between text-on-surface font-medium pt-4 border-t-[0.5px] border-outline-variant text-body-lg">
<span>Total</span>
<span>USD $1,270.00</span>
</div>
</div>
</div>
</aside>
</main>
<!-- Footer Suppressed as per rule: Linear/Transactional intent (Checkout) -->
</body></html>
